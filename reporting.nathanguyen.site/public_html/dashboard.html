<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="dashboard-layout">

        <header class="app-header">
            <h1 class="app-title">Analytics Dashboard</h1>
            <div class="header-controls">
                <input type="date" id="date-start" class="form-control form-control-sm">
                <span class="text-muted">to</span>
                <input type="date" id="date-end" class="form-control form-control-sm">
                <span id="welcome-msg" class="fw-bold text-dark"></span>
                <button id="theme-toggle" title="Toggle dark mode">🌙</button>
                <button id="logout-btn" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Sign Out
                </button>
            </div>
        </header>

        <nav class="app-sidebar">
            <a href="#/overview"    id="nav-overview"     class="sidebar-link active"><i class="bi bi-speedometer2"></i> Overview</a>
            <a href="#/performance" id="nav-performance"  class="sidebar-link"><i class="bi bi-graph-up"></i> Performance</a>
            <a href="#/errors"      id="nav-errors"       class="sidebar-link"><i class="bi bi-exclamation-triangle"></i> Errors</a>
            <a href="#/sessions"    id="nav-sessions"     class="sidebar-link"><i class="bi bi-people"></i> Sessions</a>
            <a href="#/reports"     id="nav-reports"      class="sidebar-link" style="display:none"><i class="bi bi-file-earmark-text"></i> Reports</a>
            <a href="#/admin"       id="nav-admin"        class="sidebar-link" style="display:none"><i class="bi bi-shield-lock"></i> Manage Users</a>
        </nav>

        <main class="app-main">
            <div id="content"></div>
        </main>

    </div>

    <noscript>
        <style>
            .dashboard-layout { display: none; }
        </style>
        <div style="font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;background:#f4f7f6;">
            <div style="text-align:center;background:#fff;padding:2.5rem;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.1);max-width:420px;">
                <div style="font-size:3rem;margin-bottom:1rem;">⚠️</div>
                <h2 style="color:#2c3e50;margin-bottom:0.75rem;">JavaScript Required</h2>
                <p style="color:#7f8c8d;">This analytics dashboard requires JavaScript to function. Please enable JavaScript in your browser settings and reload the page.</p>
            </div>
        </div>
    </noscript>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
