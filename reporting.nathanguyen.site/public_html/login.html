<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Analytics Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --blue: #4e73df; --green: #1cc88a; --sidebar-bg: #2c3e50;
            --bg: #f4f7f6; --surface: #ffffff; --border: #dee2e6;
            --text: #333333; --text-muted: #7f8c8d;
        }
        [data-theme="dark"] {
            --bg: #0f1117; --surface: #1a1d27; --border: #2e3347;
            --text: #e2e8f0; --text-muted: #8892a4;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            transition: background 0.25s;
        }
        .login-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            transition: background 0.25s;
        }
        .brand-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.75rem;
        }
        .brand-icon {
            width: 36px; height: 36px;
            background: var(--sidebar-bg);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: var(--green); font-size: 1.1rem;
        }
        .brand-name { font-size: 1rem; font-weight: 700; color: var(--text); }
        .login-heading { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 0.35rem; }
        .login-subheading { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1.75rem; }
        .field-label { font-weight: 600; font-size: 0.875rem; color: var(--text); display: block; margin-bottom: 0.4rem; }
        .field-input {
            background: var(--bg); color: var(--text); border: 1px solid var(--border);
            border-radius: 6px; padding: 0.65rem 0.9rem; font-size: 0.9rem; width: 100%;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .field-input:focus {
            outline: none; border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(78,115,223,0.15);
            background: var(--surface); color: var(--text);
        }
        [data-theme="dark"] .field-input::placeholder { color: #4a5568; }
        .field-group { margin-bottom: 1rem; }
        .btn-signin {
            width: 100%; padding: 0.75rem; background: var(--blue); color: #fff;
            border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            gap: 0.5rem; margin-top: 1.5rem; transition: background 0.2s, opacity 0.2s;
        }
        .btn-signin:hover:not(:disabled) { background: #3a5cc7; }
        .btn-signin:disabled { opacity: 0.65; cursor: not-allowed; }
        .err-box {
            background: #fff0f0; color: #c0392b; border-left: 4px solid #e74a3b;
            padding: 0.75rem 1rem; border-radius: 4px; font-size: 0.875rem;
            margin-bottom: 1.25rem; display: none;
        }
        [data-theme="dark"] .err-box { background: #2a1a1a; color: #f87171; }
        #theme-toggle {
            position: fixed; top: 1rem; right: 1rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 6px; padding: 0.3rem 0.6rem;
            cursor: pointer; font-size: 1rem; color: var(--text);
            transition: background 0.2s;
        }
        #theme-toggle:hover { background: var(--bg); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-row">
            <div class="brand-icon"><i class="bi bi-bar-chart-line-fill"></i></div>
            <div class="brand-name">Analytics Dashboard</div>
        </div>

        <div class="login-heading">Welcome back</div>
        <div class="login-subheading">Sign in to your account to continue</div>

        <div id="error-msg" class="err-box"></div>

        <div class="field-group">
            <label for="email" class="field-label">Email address</label>
            <input type="email" id="email" class="field-input"
                placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field-group">
            <label for="password" class="field-label">Password</label>
            <input type="password" id="password" class="field-input"
                placeholder="Enter your password" autocomplete="current-password">
        </div>

        <button id="login-btn" class="btn-signin">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
    </div>

    <button id="theme-toggle" title="Toggle dark mode">🌙</button>

    <noscript>
        <style>body { display: block; } .login-card { display: none; }</style>
        <div style="font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;background:#f4f7f6;">
            <div style="text-align:center;background:#fff;padding:2.5rem;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);max-width:420px">
                <div style="font-size:3rem;margin-bottom:1rem">⚠️</div>
                <h2 style="color:#2c3e50;margin-bottom:.75rem">JavaScript Required</h2>
                <p style="color:#7f8c8d">This dashboard requires JavaScript. Please enable it in your browser settings.</p>
            </div>
        </div>
    </noscript>

    <script>
        (function() {
            const t = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();

        const themeBtn = document.getElementById('theme-toggle');
        function updateTheme() {
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            themeBtn.textContent = dark ? '☀️' : '🌙';
            themeBtn.title = dark ? 'Switch to light mode' : 'Switch to dark mode';
        }
        updateTheme();
        themeBtn.addEventListener('click', () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateTheme();
        });

        const emailEl = document.getElementById('email');
        const passEl  = document.getElementById('password');
        const btn     = document.getElementById('login-btn');
        const errEl   = document.getElementById('error-msg');

        function showError(msg) { errEl.textContent = msg; errEl.style.display = 'block'; }

        async function doLogin() {
            const email    = emailEl.value.trim();
            const password = passEl.value;
            if (!email || !password) { showError('Please enter your email and password.'); return; }

            btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Signing in\u2026';
            btn.disabled = true;
            errEl.style.display = 'none';

            try {
                const res  = await fetch('/api/login', {
                    method: 'POST', credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = './dashboard.html';
                } else {
                    showError(data.error || 'Invalid email or password.');
                    btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
                    btn.disabled = false;
                }
            } catch {
                showError('Network error. Please try again.');
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Sign In';
                btn.disabled = false;
            }
        }

        btn.addEventListener('click', doLogin);
        passEl.addEventListener('keydown',  e => { if (e.key === 'Enter') doLogin(); });
        emailEl.addEventListener('keydown', e => { if (e.key === 'Enter') passEl.focus(); });
    </script>
</body>
</html>
