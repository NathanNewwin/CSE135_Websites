<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --blue:#4e73df; --bg:#f4f7f6; --surface:#fff; --text:#333; --text-muted:#7f8c8d; --sidebar-bg:#2c3e50; }
        [data-theme="dark"] { --bg:#0f1117; --surface:#1a1d27; --text:#e2e8f0; --text-muted:#8892a4; }
        body { background:var(--bg); min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Segoe UI',sans-serif; transition:background 0.25s; }
        .card { background:var(--surface); border-radius:12px; padding:3rem 2.5rem; max-width:460px; width:100%; box-shadow:0 4px 24px rgba(0,0,0,.08); text-align:center; }
        .code { font-size:5rem; font-weight:800; color:var(--blue); line-height:1; }
        .title { font-size:1.4rem; font-weight:700; color:var(--text); margin:0.5rem 0; }
        .desc { color:var(--text-muted); font-size:0.9rem; margin-bottom:2rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="code">404</div>
        <div class="title">Page Not Found</div>
        <p class="desc">The page you're looking for doesn't exist or has been moved.</p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="/dashboard.html" class="btn btn-primary flex-fill">
                <i class="bi bi-speedometer2 me-1"></i> Dashboard
            </a>
            <a href="/login.html" class="btn btn-outline-secondary flex-fill">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </a>
        </div>
    </div>
    <script>
        (function() { const t=localStorage.getItem('theme')||'light'; document.documentElement.setAttribute('data-theme',t); })();
    </script>
</body>
</html>
